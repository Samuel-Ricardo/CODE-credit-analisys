name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancela execuções anteriores se novo push for feito
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  CACHE_NAME: 'node-modules'

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # JOB 1: Setup & Validação Inicial
  # ═══════════════════════════════════════════════════════════════════
  setup:
    name: 🔧 Setup & Validation
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ steps.config.outputs.node-version }}
      cache-hit: ${{ steps.cache-deps.outputs.cache-hit }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for better analysis

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            .next/cache
          key: ${{ runner.os }}-${{ env.CACHE_NAME }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_NAME }}-

      - name: 📥 Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: 🔍 Validate package.json
        run: |
          if [ ! -f package.json ]; then
            echo "❌ package.json not found"
            exit 1
          fi
          echo "✅ package.json is valid"

      - name: 📊 Output config
        id: config
        run: |
          echo "node-version=${{ env.NODE_VERSION }}" >> $GITHUB_OUTPUT
          echo "📋 Node version: ${{ env.NODE_VERSION }}"

  # ═══════════════════════════════════════════════════════════════════
  # JOB 2: Lint & Code Quality
  # ═══════════════════════════════════════════════════════════════════
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          cache: 'npm'

      - name: 📦 Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-${{ env.CACHE_NAME }}-${{ hashFiles('**/package-lock.json') }}

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: 📊 Lint report
        if: always()
        run: |
          echo "✅ ESLint check completed"

  # ═══════════════════════════════════════════════════════════════════
  # JOB 3: Type Check
  # ═══════════════════════════════════════════════════════════════════
  typecheck:
    name: 📘 TypeScript Type Check
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          cache: 'npm'

      - name: 📦 Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-${{ env.CACHE_NAME }}-${{ hashFiles('**/package-lock.json') }}

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Run TypeScript compiler
        run: npx tsc --noEmit

      - name: 📊 Type check report
        if: always()
        run: |
          echo "✅ TypeScript type check completed"

  # ═══════════════════════════════════════════════════════════════════
  # JOB 4: Unit Tests
  # ═══════════════════════════════════════════════════════════════════
  test-unit:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        node-version: ['20.x', '22.x']
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-${{ env.CACHE_NAME }}-${{ hashFiles('**/package-lock.json') }}

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🧪 Run unit tests
        run: npm run test:unit -- --coverage

      - name: 📊 Upload coverage to Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: unit-tests-coverage
          fail_ci_if_error: false

      - name: 📈 Coverage report
        if: always() && matrix.node-version == '20.x'
        run: |
          echo "📊 Unit Test Coverage Report:"
          cat coverage/coverage-summary.json || echo "Coverage summary not available"

  # ═══════════════════════════════════════════════════════════════════
  # JOB 5: Integration Tests
  # ═══════════════════════════════════════════════════════════════════
  test-integration:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          cache: 'npm'

      - name: 📦 Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-${{ env.CACHE_NAME }}-${{ hashFiles('**/package-lock.json') }}

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔗 Run integration tests
        run: npm run test:integration -- --coverage

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: integration
          name: integration-tests-coverage
          fail_ci_if_error: false

  # ═══════════════════════════════════════════════════════════════════
  # JOB 6: Component Tests
  # ═══════════════════════════════════════════════════════════════════
  test-components:
    name: 🎨 Component Tests
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          cache: 'npm'

      - name: 📦 Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-${{ env.CACHE_NAME }}-${{ hashFiles('**/package-lock.json') }}

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🎨 Run component tests
        run: npm run test:components -- --coverage

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: components
          name: component-tests-coverage
          fail_ci_if_error: false

  # ═══════════════════════════════════════════════════════════════════
  # JOB 7: Build Validation
  # ═══════════════════════════════════════════════════════════════════
  build:
    name: 🏗️ Build Validation
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            .next/cache
          key: ${{ runner.os }}-${{ env.CACHE_NAME }}-${{ hashFiles('**/package-lock.json') }}

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗️ Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next
          retention-days: 7

      - name: 📊 Build size analysis
        run: |
          echo "📦 Build completed successfully"
          du -sh .next || echo "Build size analysis not available"

  # ═══════════════════════════════════════════════════════════════════
  # JOB 8: Quality Gate
  # ═══════════════════════════════════════════════════════════════════
  quality-gate:
    name: ✅ Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit, test-integration, test-components, build]
    if: always()
    
    steps:
      - name: 📊 Check all jobs status
        run: |
          echo "🔍 Checking quality gate..."
          
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ Lint failed"
            exit 1
          fi
          
          if [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "❌ Type check failed"
            exit 1
          fi
          
          if [ "${{ needs.test-unit.result }}" != "success" ]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          
          if [ "${{ needs.test-integration.result }}" != "success" ]; then
            echo "❌ Integration tests failed"
            exit 1
          fi
          
          if [ "${{ needs.test-components.result }}" != "success" ]; then
            echo "❌ Component tests failed"
            exit 1
          fi
          
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          
          echo "✅ All quality checks passed!"

      - name: 📊 Summary
        if: always()
        run: |
          echo "## 📊 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.test-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Component Tests | ${{ needs.test-components.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
