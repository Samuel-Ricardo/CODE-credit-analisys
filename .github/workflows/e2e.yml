name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    # Executa testes E2E diariamente às 2h da manhã (UTC)
    - cron: '0 2 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  # Cypress configuration
  CYPRESS_CACHE_FOLDER: ~/.cache/Cypress
  CYPRESS_VIDEO: true
  CYPRESS_SCREENSHOTS: true

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # JOB 1: E2E Tests com Cypress (Paralelo)
  # ═══════════════════════════════════════════════════════════════════
  cypress-run:
    name: 🎭 Cypress E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    strategy:
      fail-fast: false
      matrix:
        # Paralelização dos testes em 3 containers
        containers: [1, 2, 3]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Cache Cypress binary
        id: cache-cypress
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Cypress
            node_modules/cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cypress-

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Verify Cypress
        run: npx cypress verify

      - name: 📊 Cypress info
        run: npx cypress info

      - name: 🚀 Start Next.js dev server
        run: |
          npm run dev &
          npx wait-on http://localhost:3000 -t 60000
        env:
          CI: true

      - name: 🎭 Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          # Servidor já está rodando
          start: ''
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 60
          browser: electron
          record: false
          parallel: true
          group: 'E2E Tests'
          ci-build-id: ${{ github.sha }}-${{ github.run_number }}
          config: baseUrl=http://localhost:3000
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📸 Upload screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ matrix.containers }}
          path: cypress/screenshots
          retention-days: 7

      - name: 🎥 Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-${{ matrix.containers }}
          path: cypress/videos
          retention-days: 7

      - name: 📊 Test results summary
        if: always()
        run: |
          echo "## 🎭 Cypress E2E Results (Container ${{ matrix.containers }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "cypress/results" ]; then
            cat cypress/results/*.json >> $GITHUB_STEP_SUMMARY || echo "No results file found"
          else
            echo "Results directory not found" >> $GITHUB_STEP_SUMMARY
          fi

  # ═══════════════════════════════════════════════════════════════════
  # JOB 2: E2E Tests - Specific Critical Flows
  # ═══════════════════════════════════════════════════════════════════
  cypress-critical:
    name: 🔥 Critical User Flows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Cypress
            node_modules/cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('**/package-lock.json') }}

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🚀 Start Next.js dev server
        run: |
          npm run dev &
          npx wait-on http://localhost:3000 -t 60000

      - name: 🔥 Run critical flow tests
        run: npx cypress run --browser electron --spec "cypress/e2e/06-fluxo-completo.cy.ts"
        env:
          CYPRESS_baseUrl: http://localhost:3000

      - name: 📸 Upload screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-critical-screenshots
          path: cypress/screenshots
          retention-days: 14

      - name: 🎥 Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-critical-videos
          path: cypress/videos
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════
  # JOB 3: E2E Tests - Different Browsers (Opcional)
  # ═══════════════════════════════════════════════════════════════════
  cypress-browsers:
    name: 🌐 Cross-Browser Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Cypress
            node_modules/cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('**/package-lock.json') }}

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🚀 Start Next.js dev server
        run: |
          npm run dev &
          npx wait-on http://localhost:3000 -t 60000

      - name: 🌐 Run Cypress on ${{ matrix.browser }}
        uses: cypress-io/github-action@v6
        with:
          start: ''
          wait-on: 'http://localhost:3000'
          browser: ${{ matrix.browser }}
          config: baseUrl=http://localhost:3000

      - name: 📸 Upload screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-${{ matrix.browser }}-screenshots
          path: cypress/screenshots
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════
  # JOB 4: E2E Quality Gate
  # ═══════════════════════════════════════════════════════════════════
  e2e-quality-gate:
    name: ✅ E2E Quality Gate
    runs-on: ubuntu-latest
    needs: [cypress-run, cypress-critical]
    if: always()
    
    steps:
      - name: 📊 Check E2E tests status
        run: |
          echo "🔍 Checking E2E quality gate..."
          
          if [ "${{ needs.cypress-run.result }}" != "success" ]; then
            echo "❌ Cypress E2E tests failed"
            exit 1
          fi
          
          if [ "${{ needs.cypress-critical.result }}" != "success" ]; then
            echo "❌ Critical flow tests failed"
            exit 1
          fi
          
          echo "✅ All E2E tests passed!"

      - name: 📊 Summary
        if: always()
        run: |
          echo "## 🎭 E2E Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cypress E2E Tests | ${{ needs.cypress-run.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Critical Flows | ${{ needs.cypress-critical.result }} |" >> $GITHUB_STEP_SUMMARY
