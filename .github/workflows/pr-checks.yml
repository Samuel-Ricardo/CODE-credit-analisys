name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Validate PR title follows Conventional Commits spec
  # https://www.conventionalcommits.org/
  # ─────────────────────────────────────────────────────────────
  validate-pr-title:
    name: Validate PR Title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed commit types
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # Allowed scopes (optional — leave blank to allow any scope)
          # scopes: |
          #   ui
          #   api
          #   domain
          #   application
          #   e2e
          requireScope: false
          # Subject must not start with uppercase
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The PR title subject "{subject}" must not start with an uppercase letter.
            Expected format: type(optional-scope): lowercase description
            Examples:
              feat(ui): add rejection reason card on detail page
              fix(e2e): align Cypress assertions with seeded data
              chore(deps): update cypress to v15
          # Require a body if the PR modifies more than N files
          validateSingleCommit: false
          disallowScopes:
            - release

  # ─────────────────────────────────────────────────────────────
  # Job 2: Validate branch naming convention
  # Expected: feat/, fix/, chore/, ci/, docs/, refactor/, test/
  # ─────────────────────────────────────────────────────────────
  validate-branch-name:
    name: Validate Branch Name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming convention
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch: $BRANCH"
          PATTERN="^(feat|fix|chore|ci|docs|refactor|test|perf|style|revert|hotfix|release|build)/.+"
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "❌ Branch name '$BRANCH' does not follow the naming convention."
            echo ""
            echo "Expected pattern: <type>/<short-description>"
            echo "Examples:"
            echo "  feat/add-dashboard-charts"
            echo "  fix/e2e-approval-flow"
            echo "  chore/update-dependencies"
            echo "  ci/add-security-workflow"
            exit 1
          fi
          echo "✅ Branch name '$BRANCH' is valid."

  # ─────────────────────────────────────────────────────────────
  # Job 3: PR size check — warn on large PRs
  # ─────────────────────────────────────────────────────────────
  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Evaluate PR size
        id: size
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          ADDITIONS=$(git diff --numstat $BASE..$HEAD | awk '{sum+=$1} END {print sum+0}')
          DELETIONS=$(git diff --numstat $BASE..$HEAD | awk '{sum+=$2} END {print sum+0}')
          FILES=$(git diff --name-only $BASE..$HEAD | wc -l | tr -d ' ')
          TOTAL=$((ADDITIONS + DELETIONS))

          echo "additions=$ADDITIONS" >> $GITHUB_OUTPUT
          echo "deletions=$DELETIONS" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

          echo "📊 PR Stats:"
          echo "  Files changed : $FILES"
          echo "  Additions     : +$ADDITIONS"
          echo "  Deletions     : -$DELETIONS"
          echo "  Total lines   : $TOTAL"

          if [ "$TOTAL" -gt 1500 ]; then
            echo "size_label=XL" >> $GITHUB_OUTPUT
            echo "⚠️  XL PR ($TOTAL lines changed). Consider splitting."
          elif [ "$TOTAL" -gt 600 ]; then
            echo "size_label=L" >> $GITHUB_OUTPUT
            echo "ℹ️  Large PR ($TOTAL lines changed)."
          elif [ "$TOTAL" -gt 300 ]; then
            echo "size_label=M" >> $GITHUB_OUTPUT
            echo "✅ Medium PR ($TOTAL lines changed)."
          else
            echo "size_label=S" >> $GITHUB_OUTPUT
            echo "✅ Small PR ($TOTAL lines changed)."
          fi

      - name: Comment PR size summary
        uses: actions/github-script@v7
        with:
          script: |
            const additions = '${{ steps.size.outputs.additions }}';
            const deletions = '${{ steps.size.outputs.deletions }}';
            const files     = '${{ steps.size.outputs.files }}';
            const total     = '${{ steps.size.outputs.total }}';
            const label     = '${{ steps.size.outputs.size_label }}';

            const icons = { S: '🟢', M: '🟡', L: '🟠', XL: '🔴' };
            const icon  = icons[label] || '⚪';

            const body = [
              `## ${icon} PR Size: **${label}**`,
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| Files changed | ${files} |`,
              `| Lines added   | +${additions} |`,
              `| Lines removed | -${deletions} |`,
              `| Total changes | ${total} |`,
              '',
              label === 'XL'
                ? '> ⚠️ **Large PR detected.** Consider breaking this into smaller, focused pull requests to ease review.'
                : '> ✅ PR size looks good.',
            ].join('\n');

            // Find and update existing size comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('PR Size:')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # JOB 1: PR Metadata & Validation
  # ═══════════════════════════════════════════════════════════════════
  pr-metadata:
    name: 📋 PR Metadata Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📝 Check PR title
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          
          # Verifica se o título segue o padrão Conventional Commits
          if echo "$PR_TITLE" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?!?: .+"; then
            echo "✅ PR title follows Conventional Commits format"
          else
            echo "⚠️ PR title does not follow Conventional Commits format"
            echo "Expected format: type(scope)?: description"
            echo "Types: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert"
            exit 1
          fi

      - name: 📝 Check PR description
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          
          if [ -z "$PR_BODY" ]; then
            echo "⚠️ PR description is empty"
            exit 1
          fi
          
          if [ ${#PR_BODY} -lt 50 ]; then
            echo "⚠️ PR description is too short (minimum 50 characters)"
            exit 1
          fi
          
          echo "✅ PR description is adequate"

      - name: 🏷️ Check labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            
            if (labels.length === 0) {
              core.warning('⚠️ No labels assigned to this PR');
            } else {
              core.info(`✅ Labels: ${labels.join(', ')}`);
            }

  # ═══════════════════════════════════════════════════════════════════
  # JOB 2: Code Size Analysis
  # ═══════════════════════════════════════════════════════════════════
  size-analysis:
    name: 📦 Bundle Size Analysis
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗️ Build application
        run: npm run build

      - name: 📊 Analyze bundle size
        run: |
          echo "## 📦 Bundle Size Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d ".next/static" ]; then
            echo "### Static Files:" >> $GITHUB_STEP_SUMMARY
            du -sh .next/static >> $GITHUB_STEP_SUMMARY || true
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### JavaScript Bundles:" >> $GITHUB_STEP_SUMMARY
            find .next/static -name "*.js" -exec du -h {} \; | sort -rh | head -10 >> $GITHUB_STEP_SUMMARY || true
          fi

  # ═══════════════════════════════════════════════════════════════════
  # JOB 3: Security Scan
  # ═══════════════════════════════════════════════════════════════════
  security-scan:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 🔍 Run npm audit
        run: |
          npm audit --audit-level=moderate || true
          
      - name: 📊 Generate security report
        run: |
          echo "## 🔒 Security Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npm audit --json > audit-report.json || true
          
          if [ -f "audit-report.json" ]; then
            echo "Security audit completed. Check artifacts for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📦 Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: audit-report.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════
  # JOB 4: Dependency Review
  # ═══════════════════════════════════════════════════════════════════
  dependency-review:
    name: 🔍 Dependency Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: true

  # ═══════════════════════════════════════════════════════════════════
  # JOB 5: Coverage Diff
  # ═══════════════════════════════════════════════════════════════════
  coverage-diff:
    name: 📊 Coverage Comparison
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 📥 Checkout PR code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🧪 Run tests with coverage
        run: npm run test:coverage

      - name: 📊 Generate coverage report
        run: |
          echo "## 📊 Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "coverage/coverage-summary.json" ]; then
            echo "Coverage data collected successfully" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📈 Comment coverage on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            
            if (fs.existsSync('coverage/coverage-summary.json')) {
              const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const total = coverage.total;
              
              const comment = `## 📊 Test Coverage Report
              
              | Metric | Coverage |
              |--------|----------|
              | Lines | ${total.lines.pct}% |
              | Statements | ${total.statements.pct}% |
              | Functions | ${total.functions.pct}% |
              | Branches | ${total.branches.pct}% |
              
              ${total.lines.pct >= 80 ? '✅' : '⚠️'} Coverage threshold: 80%
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  # ═══════════════════════════════════════════════════════════════════
  # JOB 6: Changed Files Analysis
  # ═══════════════════════════════════════════════════════════════════
  changed-files:
    name: 📁 Changed Files Analysis
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📁 Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            src/**/*.{ts,tsx}
            cypress/**/*.ts

      - name: 📊 Analyze changes
        run: |
          echo "## 📁 Changed Files Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total files changed: ${{ steps.changed-files.outputs.all_changed_files_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "${{ steps.changed-files.outputs.all_changed_files }}" ]; then
            echo "### Modified files:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.changed-files.outputs.all_changed_files }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ═══════════════════════════════════════════════════════════════════
  # JOB 7: PR Quality Gate
  # ═══════════════════════════════════════════════════════════════════
  pr-quality-gate:
    name: ✅ PR Quality Gate
    runs-on: ubuntu-latest
    needs: [pr-metadata, size-analysis, security-scan, dependency-review, coverage-diff]
    if: always() && github.event.pull_request.draft == false
    
    steps:
      - name: 📊 Check all PR checks
        run: |
          echo "🔍 Validating PR quality gate..."
          
          if [ "${{ needs.pr-metadata.result }}" != "success" ]; then
            echo "❌ PR metadata check failed"
            exit 1
          fi
          
          if [ "${{ needs.size-analysis.result }}" != "success" ]; then
            echo "❌ Bundle size analysis failed"
            exit 1
          fi
          
          if [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "⚠️ Security scan completed with warnings"
          fi
          
          if [ "${{ needs.dependency-review.result }}" != "success" ]; then
            echo "⚠️ Dependency review completed with warnings"
          fi
          
          if [ "${{ needs.coverage-diff.result }}" != "success" ]; then
            echo "⚠️ Coverage check completed with warnings"
          fi
          
          echo "✅ PR quality checks completed!"

      - name: 📊 Final Summary
        if: always()
        run: |
          echo "## ✅ PR Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Metadata | ${{ needs.pr-metadata.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle Size | ${{ needs.size-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies | ${{ needs.dependency-review.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage-diff.result }} |" >> $GITHUB_STEP_SUMMARY
